%YAML 1.2
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ShipFast Order Notification Pipeline

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        LOG_LEVEL: INFO

Parameters:
  OnCallEmail:
    Type: String
    Description: Email address for on-call CloudWatch alarm notifications

  SlackWebhookSsmPath:
    Type: AWS::SSM::Parameter::Name
    Default: /shipfast/slack-webhook-url
    Description: >
      SSM SecureString parameter path storing the Slack webhook URL.
      Store the secret first:
        aws ssm put-parameter --name /shipfast/slack-webhook-url \
          --value "https://hooks.slack.com/..." --type SecureString

# ─────────────────────────────────────────────────────────────
# SNS TOPIC
# ─────────────────────────────────────────────────────────────
Resources:

  OrderEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: order-events
      DisplayName: ShipFast Order Events

  # ─────────────────────────────────────────────────────────────
  # SQS QUEUES + DLQs
  # ─────────────────────────────────────────────────────────────

  # --- Email ---
  EmailDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: email-dlq
      MessageRetentionPeriod: 1209600   # 14 days
      KmsMasterKeyId: alias/aws/sqs

  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: email-queue
      # FIX 1: VisibilityTimeout must be 6x Lambda timeout (6 * 30 = 180s).
      # The old value of 30s matched the Lambda timeout exactly, which caused
      # messages to become visible again mid-execution, triggering duplicate
      # processing and burning through maxReceiveCount prematurely.
      VisibilityTimeout: 180
      MessageRetentionPeriod: 345600    # 4 days
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDLQ.Arn
        maxReceiveCount: 3

  # --- Slack ---
  SlackDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: slack-dlq
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  SlackQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: slack-queue
      VisibilityTimeout: 180            # FIX 1 (same as above)
      MessageRetentionPeriod: 345600
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SlackDLQ.Arn
        maxReceiveCount: 3

  # --- Audit ---
  AuditDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: audit-dlq
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  AuditQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: audit-queue
      VisibilityTimeout: 180            # FIX 1 (same as above)
      MessageRetentionPeriod: 345600
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AuditDLQ.Arn
        maxReceiveCount: 3

  # ─────────────────────────────────────────────────────────────
  # SNS → SQS SUBSCRIPTIONS + QUEUE POLICIES
  # ─────────────────────────────────────────────────────────────

  EmailQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref EmailQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: {Service: sns.amazonaws.com}
            Action: sqs:SendMessage
            Resource: !GetAtt EmailQueue.Arn
            Condition:
              ArnEquals: {aws:SourceArn: !Ref OrderEventsTopic}

  SlackQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref SlackQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: {Service: sns.amazonaws.com}
            Action: sqs:SendMessage
            Resource: !GetAtt SlackQueue.Arn
            Condition:
              ArnEquals: {aws:SourceArn: !Ref OrderEventsTopic}

  AuditQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref AuditQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: {Service: sns.amazonaws.com}
            Action: sqs:SendMessage
            Resource: !GetAtt AuditQueue.Arn
            Condition:
              ArnEquals: {aws:SourceArn: !Ref OrderEventsTopic}

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt EmailQueue.Arn

  SlackSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt SlackQueue.Arn

  AuditSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt AuditQueue.Arn

  # ─────────────────────────────────────────────────────────────
  # LAMBDA FUNCTIONS
  # ─────────────────────────────────────────────────────────────

  # Task 1: API Publisher
  OrderPublisherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: order-publisher
      CodeUri: src/publisher/
      Handler: handler.lambda_handler
      Description: Validates order payload and publishes to SNS
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref OrderEventsTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OrderEventsTopic.TopicName
      Events:
        OrderPost:
          Type: Api
          Properties:
            Path: /orders
            Method: POST

  # Task 3: Email Consumer
  EmailConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: email-consumer
      CodeUri: src/email_consumer/
      Handler: handler.lambda_handler
      Description: Sends order confirmation emails via SES
      Environment:
        Variables:
          SES_FROM_ADDRESS: orders@shipfast.example.com
      # FIX 5: Replaced overly broad SESCrudPolicy (grants ses:*) with a
      # least-privilege inline statement scoped to only the send actions needed.
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/shipfast.example.com"
      Events:
        EmailQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # Task 3: Slack Consumer
  SlackConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-consumer
      CodeUri: src/slack_consumer/
      Handler: handler.lambda_handler
      Description: Posts order alerts to Slack ops channel
      Environment:
        Variables:
          # FIX 3: Webhook URL was previously sourced directly from a CloudFormation
          # parameter and stored as plaintext in the Lambda environment — visible in
          # the console and via get-function-configuration. Now resolved at deploy-time
          # from an SSM SecureString so the secret never appears in Lambda config.
          SLACK_WEBHOOK_URL: !Sub "{{resolve:ssm-secure:${SlackWebhookSsmPath}}}"
      # FIX 2: SlackConsumerFunction had no Policies block at all. Added CloudWatch
      # Logs permissions so the function can write its own execution logs (required
      # for any meaningful debugging of Slack delivery failures).
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/slack-consumer:*"
      Events:
        SlackQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt SlackQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # Task 3: Audit Consumer
  AuditConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: audit-consumer
      CodeUri: src/audit_consumer/
      Handler: handler.lambda_handler
      Description: Writes structured audit logs to CloudWatch
      # FIX 4: AuditConsumerFunction had no Policies block. The function's entire
      # purpose is writing to CloudWatch Logs, but SAM's default execution role only
      # covers the function's own bootstrap log group. Added PutLogEvents permission
      # scoped to the audit consumer's log group.
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/audit-consumer:*"
      Events:
        AuditQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt AuditQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # ─────────────────────────────────────────────────────────────
  # TASK 4: DLQ ALARMS + ON-CALL SNS TOPIC
  # ─────────────────────────────────────────────────────────────

  OnCallAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: on-call-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref OnCallEmail

  EmailDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EmailDLQ-MessageDepthHigh
      AlarmDescription: Email DLQ has more than 5 messages — email consumer is failing
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EmailDLQ.QueueName
      Statistic: Maximum
      # FIX 7: Period changed from 60s to 300s. SQS metrics have up to 5-minute
      # propagation delay, making a 60s period unreliable and prone to false positives
      # during legitimate burst processing that resolves within a single poll cycle.
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OnCallAlertTopic]
      OKActions: [!Ref OnCallAlertTopic]
      # FIX 6: Added InsufficientDataActions. Without this, if CloudWatch stops
      # receiving SQS metrics (e.g. misconfiguration, queue deletion, regional issue)
      # the alarm silently enters INSUFFICIENT_DATA with no notification.
      InsufficientDataActions: [!Ref OnCallAlertTopic]

  SlackDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: SlackDLQ-MessageDepthHigh
      AlarmDescription: Slack DLQ has more than 5 messages — Slack consumer is failing
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SlackDLQ.QueueName
      Statistic: Maximum
      Period: 300                        # FIX 7
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OnCallAlertTopic]
      OKActions: [!Ref OnCallAlertTopic]
      InsufficientDataActions: [!Ref OnCallAlertTopic]  # FIX 6

  AuditDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AuditDLQ-MessageDepthHigh
      AlarmDescription: Audit DLQ has more than 5 messages — audit consumer is failing
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AuditDLQ.QueueName
      Statistic: Maximum
      Period: 300                        # FIX 7
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OnCallAlertTopic]
      OKActions: [!Ref OnCallAlertTopic]
      InsufficientDataActions: [!Ref OnCallAlertTopic]  # FIX 6

# ─────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────

Outputs:
  OrdersApiEndpoint:
    Description: API Gateway endpoint for order events
    Value: !Sub "https://${OrderPublisherFunction.RestApiId}.execute-api.${AWS::Region}.amazonaws.com/Prod/orders"
    Export:
      Name: ShipFastOrdersEndpoint
  OrderEventsTopicArn:
    Value: !Ref OrderEventsTopic
  EmailQueueUrl:
    Value: !Ref EmailQueue
  SlackQueueUrl:
    Value: !Ref SlackQueue
  AuditQueueUrl:
    Value: !Ref AuditQueue