name: ShipFast Orders Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: shipfast-orders

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests
  # Pipeline FAILS here if any test fails — nothing deploys.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov boto3

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SAM Build + Deploy (only on push to main)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test              # Only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Store these in GitHub Settings → Secrets and variables → Actions
          # NEVER commit keys to the repository
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Build
        run: sam build --use-container

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              OnCallEmail=${{ secrets.ONCALL_EMAIL }} \
              SlackWebhookUrl=${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Smoke Test — calls the live endpoint after deploy
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API endpoint from stack outputs
        id: get-endpoint
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='OrdersApiEndpoint'].OutputValue" \
            --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "API endpoint: $ENDPOINT"

      - name: POST a test order and assert 202
        run: |
          ENDPOINT="${{ steps.get-endpoint.outputs.endpoint }}"

          RESPONSE=$(curl -s -o /tmp/smoke_body.json -w "%{http_code}" \
            -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -d '{
              "order_id": "SMOKE-TEST-001",
              "email": "smoke@shipfast.example.com",
              "items": ["Test Widget"]
            }')

          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat /tmp/smoke_body.json

          if [ "$RESPONSE" -ne 202 ]; then
            echo "❌ SMOKE TEST FAILED: Expected 202, got $RESPONSE"
            exit 1
          fi

          echo "✅ Smoke test passed — API returned 202 Accepted"
